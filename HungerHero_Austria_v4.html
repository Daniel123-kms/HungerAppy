<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#07070f">
<title>HUNGERHERO · Österreich</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;overflow:hidden;background:#07070f;font-family:'DM Sans',sans-serif;color:#f0f0f0;overscroll-behavior:none}
:root{
  --bg:#07070f;--surf:#0f0f1e;--card:#13132a;--card2:#1a1a30;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.13);
  --acc:#FF6B35;--acc2:#FF006E;--grn:#00E676;--blu:#448AFF;
  --pur:#C084FC;--yel:#FFD60A;--red:#ef4444;
  --txt:rgba(255,255,255,.92);--mut:rgba(255,255,255,.38);--dim:rgba(255,255,255,.05);
}
.syne{font-family:'Syne',sans-serif}
::-webkit-scrollbar{display:none}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}

/* HEADER */
.hdr{flex-shrink:0;padding:11px 15px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.logo-wrap{}
.logo{font-size:21px;font-weight:900;letter-spacing:-.05em;line-height:1;font-family:'Syne',sans-serif}
.logo b{color:var(--acc)}
.logo-sub{font-size:9px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.hdr-btns{display:flex;gap:5px}
.hb{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--dim);border:1px solid var(--bdr);cursor:pointer;font-size:13px;transition:transform .12s;user-select:none;flex-shrink:0}
.hb:active{transform:scale(.82)}
.hb.pro{background:linear-gradient(135deg,rgba(255,214,10,.2),rgba(255,107,53,.2));border-color:rgba(255,214,10,.4)}

/* LOC STRIP */
.loc{flex-shrink:0;padding:5px 14px;display:flex;align-items:center;gap:7px;background:rgba(68,138,255,.05);border-bottom:1px solid rgba(68,138,255,.1);cursor:pointer}
.loc-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);flex-shrink:0}
.loc-dot.off{background:var(--mut)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.loc-dot.live{animation:blink 2s infinite}
.loc-txt{font-size:10px;color:var(--mut);flex:1}
.loc-city{font-weight:800;color:var(--blu)}
.loc-arr{font-size:10px;color:var(--mut)}

/* TABS */
.tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--bdr);background:var(--bg);overflow-x:auto}
.tab{flex:1;min-width:0;padding:7px 2px 6px;text-align:center;font-size:9px;font-weight:700;color:var(--mut);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .18s;user-select:none}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.ti{font-size:14px;display:block;margin-bottom:1px}

/* VIEW */
#view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* MOOD */
.mchat{flex:1;overflow-y:auto;padding:12px 14px 6px;display:flex;flex-direction:column;gap:9px}
.bbl{max-width:85%;padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5;animation:fu .22s ease}
.bbl.ai{background:var(--card);border:1px solid var(--bdr2);align-self:flex-start;border-bottom-left-radius:4px}
.bbl.usr{background:var(--acc);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.tdots{display:flex;gap:4px;align-items:center;padding:2px 0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--mut);animation:dp 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,60%,100%{transform:scale(1);opacity:.4}30%{transform:scale(1.3);opacity:1}}
.mopts{flex-shrink:0;padding:7px 12px 8px;display:flex;flex-wrap:wrap;gap:7px}
.mopt{padding:9px 14px;border-radius:50px;border:1px solid var(--bdr2);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none}
.mopt:active{background:rgba(255,107,53,.18);border-color:var(--acc);color:var(--acc)}
.mgo{flex-shrink:0;margin:6px 14px 12px;padding:14px;border-radius:14px;background:var(--acc);color:#fff;font-size:14px;font-weight:800;border:none;cursor:pointer;font-family:'Syne',sans-serif;display:none;transition:transform .15s;width:calc(100% - 28px)}
.mgo.show{display:block}
.mgo:active{transform:scale(.97)}

/* CARDS */
.card-area{flex:1;position:relative;margin:8px 12px 4px}
.card{position:absolute;inset:0;border-radius:20px;overflow:hidden;border:1px solid var(--bdr2);user-select:none}
.ctop{position:absolute;top:0;left:0;right:0;padding:13px 13px 0;display:flex;align-items:flex-start;justify-content:space-between;z-index:5}
.cbadge{padding:5px 11px;border-radius:50px;font-size:10px;font-weight:800;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.14);letter-spacing:.06em;text-transform:uppercase}
.ctop-btns{display:flex;gap:6px}
.cib{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.14);font-size:13px;cursor:pointer;transition:transform .15s;flex-shrink:0}
.cib:active{transform:scale(.82)}
.cemoji{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-size:86px;line-height:1;pointer-events:none;filter:drop-shadow(0 8px 24px rgba(0,0,0,.45))}
.cbot{position:absolute;bottom:0;left:0;right:0;padding:15px;background:linear-gradient(to top,rgba(7,7,15,.98) 0%,rgba(7,7,15,.82) 55%,transparent 100%)}
.ctags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.ctag{padding:3px 8px;border-radius:50px;font-size:9px;font-weight:700;background:rgba(255,255,255,.09);letter-spacing:.05em;text-transform:uppercase}
.ctag.vegan,.ctag.vegetarian{background:rgba(0,230,118,.14);color:var(--grn)}
.ctag.spicy{background:rgba(239,68,68,.14);color:#f87171}
.ctag.fast,.ctag.trending{background:rgba(68,138,255,.14);color:var(--blu)}
.ctag.sweet{background:rgba(255,214,10,.14);color:var(--yel)}
.cname{font-size:22px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:4px;font-family:'Syne',sans-serif}
.cdesc{font-size:11px;color:rgba(255,255,255,.42);line-height:1.4;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cmeta{display:flex;gap:12px;align-items:center}
.cmi{font-size:11px;color:rgba(255,255,255,.52);display:flex;align-items:center;gap:3px}
.cprice{font-size:15px;font-weight:800;color:#fff;margin-left:auto}
.stamp{position:absolute;padding:8px 16px;border-radius:8px;border-width:3px;border-style:solid;font-size:22px;font-weight:900;letter-spacing:.08em;font-family:'Syne',sans-serif;opacity:0;pointer-events:none;z-index:10}
.sy{top:26px;left:14px;color:var(--grn);border-color:var(--grn);transform:rotate(-18deg)}
.sn{top:26px;right:14px;color:var(--red);border-color:var(--red);transform:rotate(18deg)}
.sp{top:50%;left:50%;transform:translate(-50%,-50%) rotate(-8deg);color:var(--blu);border-color:var(--blu)}
.swmeta{flex-shrink:0;padding:3px 14px;font-size:10px;color:var(--mut);text-align:center}
.swbtns{flex-shrink:0;padding:5px 14px 9px;display:flex;align-items:center;justify-content:center;gap:10px}
.swb{border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid;cursor:pointer;transition:all .15s;user-select:none;flex-shrink:0}
.swb:active{transform:scale(.85)}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.3)}50%{box-shadow:0 0 0 8px rgba(0,0,0,0)}}
.gp{animation:glow 2.2s infinite}
.tchips{flex-shrink:0;padding:3px 14px 8px;display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.tchip{padding:3px 9px;border-radius:50px;font-size:10px;font-weight:600;background:rgba(255,107,53,.1);color:var(--acc);border:1px solid rgba(255,107,53,.22)}

/* LIST ITEMS */
.li{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--bdr);cursor:pointer}
.li:active{background:rgba(255,255,255,.03)}
.li-ico{font-size:28px;flex-shrink:0;width:38px;text-align:center}
.li-body{flex:1;min-width:0}
.li-name{font-size:13px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:11px;color:var(--mut);margin-top:2px}
.smb{padding:6px 13px;border-radius:50px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:transform .12s;flex-shrink:0}
.smb:active{transform:scale(.9)}

/* WEEK PLAN */
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:9px 13px}
.wday{border-radius:10px;padding:6px 3px;text-align:center;background:var(--card);border:1px solid var(--bdr2);cursor:pointer;transition:all .18s;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.wday.today{border-color:var(--acc);background:rgba(255,107,53,.1)}
.wday.filled{border-color:rgba(255,107,53,.28)}
.wdn{font-size:8px;font-weight:700;color:var(--mut);text-transform:uppercase}
.wdd{font-size:10px;font-weight:700;color:var(--txt)}
.wde{font-size:17px;line-height:1}
.wdf{font-size:8px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:36px}

/* HEALTH */
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 13px;margin-bottom:10px}
.hcard{background:var(--card);border-radius:14px;padding:12px;border:1px solid var(--bdr2);position:relative;overflow:hidden;cursor:pointer}
.hcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.hg::before{background:var(--grn)}.ho::before{background:var(--acc)}.hb::before{background:var(--blu)}.hp::before{background:var(--pur)}
.hval{font-size:20px;font-weight:900;color:#fff;font-family:'Syne',sans-serif;display:block;margin-bottom:1px}
.hlbl{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px}
.hbar{height:4px;border-radius:2px;background:var(--dim);overflow:hidden}
.hfill{height:100%;border-radius:2px;transition:width .8s ease}
.hsub{font-size:9px;color:var(--mut);margin-top:4px;display:block}
.wbars{display:flex;align-items:flex-end;gap:4px;padding:8px 13px 2px;height:70px}
.wcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.wbar{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.wbv{font-size:8px;font-weight:700;text-align:center;color:rgba(255,255,255,.35)}
.wbd{font-size:9px;color:var(--mut);text-align:center}
.wglass{flex:1;min-width:calc(12.5% - 5px);aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .2s;border:1px solid var(--bdr)}
.wglass.f{background:rgba(68,138,255,.22);border-color:rgba(68,138,255,.45)}
.wglass.e{background:var(--dim)}

/* SOCIAL */
.scard{margin:8px 13px;border-radius:14px;background:var(--card);border:1px solid var(--bdr2);overflow:hidden}
.scard-hdr{padding:11px 13px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr)}
.favt{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.trow{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--bdr)}
.trank{font-size:15px;font-weight:900;color:var(--mut);width:20px;flex-shrink:0;font-family:'Syne',sans-serif}
.trank.top{color:var(--yel)}

/* PROFILE */
.pstat{background:var(--card);border-radius:13px;padding:12px;text-align:center;flex:1;border:1px solid var(--bdr2)}
.psn{font-size:22px;font-weight:900;color:var(--acc);display:block;font-family:'Syne',sans-serif}
.psl{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;display:block}
.tbar{height:5px;border-radius:3px;background:var(--dim);overflow:hidden;margin-top:4px}
.tbf{height:100%;border-radius:3px;background:var(--acc)}

/* FRIDGE */
.fchip{padding:7px 12px;border-radius:50px;font-size:12px;font-weight:600;background:rgba(68,138,255,.1);border:1px solid rgba(68,138,255,.22);color:var(--blu);display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.qing{padding:6px 11px;border-radius:50px;font-size:11px;font-weight:600;border:1px solid var(--bdr2);background:var(--card);cursor:pointer;transition:all .15s}
.qing:active{background:rgba(68,138,255,.14);border-color:var(--blu);color:var(--blu)}
.mpct{padding:3px 8px;border-radius:50px;font-size:10px;font-weight:800;flex-shrink:0}
.mfull{background:rgba(0,230,118,.12);color:var(--grn);border:1px solid rgba(0,230,118,.25)}
.mpart{background:rgba(255,107,53,.12);color:var(--acc);border:1px solid rgba(255,107,53,.25)}

/* ACHIEVE */
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 13px}
.acard{border-radius:12px;padding:11px 7px;text-align:center;border:1px solid var(--bdr2);background:var(--card)}
.acard.locked{filter:grayscale(.9);opacity:.35}
.acard.unlocked{border-color:rgba(255,214,10,.3);background:rgba(255,214,10,.05)}
.aico{font-size:26px;display:block;margin-bottom:4px}
.atitle{font-size:9px;font-weight:700;color:var(--txt);line-height:1.3}

/* OVERLAYS */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(14px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;max-width:480px;margin:0 auto}
.ovl.on{opacity:1;pointer-events:all}
.sheet{background:var(--surf);border-radius:26px 26px 0 0;width:100%;padding:22px 18px 38px;border-top:1px solid var(--bdr2);transform:translateY(20px);transition:transform .28s cubic-bezier(.175,.885,.32,1.275)}
.ovl.on .sheet{transform:translateY(0)}
.scl{width:100%;margin-top:10px;padding:11px;border-radius:12px;background:var(--dim);border:1px solid var(--bdr);color:var(--mut);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dbtn{padding:14px 8px;border-radius:13px;border:1px solid var(--bdr2);background:var(--card);cursor:pointer;text-align:center;transition:all .15s}
.dbtn:active{transform:scale(.93);border-color:var(--acc)}
.dico{font-size:24px;display:block;margin-bottom:5px}
.dlbl{font-size:12px;font-weight:700;color:var(--txt);display:block}
.dsub{font-size:9px;color:var(--mut);margin-top:2px;display:block}

/* PRO */
.probadge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:50px;background:linear-gradient(135deg,#FFD60A,#FF6B35);color:#000;font-size:8px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.ppills{display:flex;gap:8px;margin-bottom:16px}
.ppill{flex:1;padding:12px 8px;border-radius:13px;border:2px solid var(--bdr2);text-align:center;cursor:pointer;transition:all .18s;position:relative}
.ppill.sel{border-color:var(--yel);background:rgba(255,214,10,.07)}
.ppillsv{position:absolute;top:-8px;left:50%;transform:translateX(-50%);padding:2px 8px;border-radius:50px;background:var(--grn);color:#000;font-size:9px;font-weight:800;white-space:nowrap}
.ctabtn{width:100%;padding:14px;border-radius:13px;background:linear-gradient(135deg,#FFD60A,#FF6B35);color:#000;font-size:14px;font-weight:800;border:none;cursor:pointer;font-family:'Syne',sans-serif;transition:transform .15s}
.ctabtn:active{transform:scale(.97)}

/* SEARCH */
.sinp{width:100%;background:var(--card);border:1px solid var(--bdr2);border-radius:11px;padding:9px 13px;font-size:13px;color:var(--txt);outline:none;font-family:'DM Sans',sans-serif}
.sinp:focus{border-color:var(--acc)}
.sinp::placeholder{color:var(--mut)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 24px;gap:10px;text-align:center;flex:1}
.eico{font-size:44px}.ettl{font-size:14px;font-weight:700;color:rgba(255,255,255,.4)}.esub{font-size:12px;color:var(--mut);line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(20,20,40,.97);border:1px solid var(--bdr2);border-radius:12px;padding:9px 18px;font-size:12px;font-weight:600;color:#fff;z-index:999;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(10px)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* SECTION HEADER */
.shdr{padding:11px 13px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sttl{font-size:14px;font-weight:900;color:var(--txt);font-family:'Syne',sans-serif}
.sact{font-size:11px;color:var(--acc);cursor:pointer;font-weight:700}
.ssub{font-size:10px;color:var(--mut)}

/* CITY PICKER */
.citem{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .15s}
.citem:active{background:rgba(255,107,53,.07)}

/* ANIMATIONS */
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pi{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
.fu{animation:fu .24s ease}
.pi{animation:pi .24s cubic-bezier(.175,.885,.32,1.275)}

/* ACHIEVEMENT CELEBRATE */
.acovl{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:flex;align-items:center;justify-content:center;max-width:480px;margin:0 auto;opacity:0;pointer-events:none;transition:opacity .25s}
.acovl.on{opacity:1;pointer-events:all}
.accard{background:var(--surf);border-radius:24px;padding:30px 22px;width:calc(100% - 40px);max-width:340px;text-align:center;border:1px solid rgba(255,214,10,.3)}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none;z-index:501}
@keyframes confettiFall{from{transform:translateY(-20px) rotate(0deg);opacity:1}to{transform:translateY(105vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo-wrap">
      <div class="logo syne">HUNGER<b>HERO</b></div>
      <div class="logo-sub" id="logoSub">Österreich · Food Discovery</div>
    </div>
    <div class="hdr-btns">
      <div class="hb" id="undoBtn" onclick="undoLast()" style="display:none" title="Rückgängig">↩</div>
      <div class="hb" onclick="setTab('fridge')" title="Kühlschrank">🧊</div>
      <div class="hb" id="searchBtn" onclick="toggleSearch()" title="Suchen">🔍</div>
      <div class="hb" onclick="setTab('profile')" title="Profil">👤</div>
      <div class="hb pro" id="proBtn" onclick="openPaywall()" title="Pro">⭐</div>
    </div>
  </div>

  <div class="loc" onclick="openCityPicker()">
    <div class="loc-dot off live" id="locDot"></div>
    <div class="loc-txt">📍 <span class="loc-city" id="locCity">Standort ermitteln...</span> <span id="locState"></span></div>
    <div class="loc-arr">▾</div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab on" onclick="setTab('mood')" id="tab-mood"><span class="ti">🧠</span>Mood</div>
    <div class="tab" onclick="setTab('swipe')" id="tab-swipe"><span class="ti">⚡</span>Swipe</div>
    <div class="tab" onclick="setTab('favs')" id="tab-favs"><span class="ti">❤️</span>Favs</div>
    <div class="tab" onclick="setTab('health')" id="tab-health"><span class="ti">💚</span>Health</div>
    <div class="tab" onclick="setTab('social')" id="tab-social"><span class="ti">👥</span>Social</div>
    <div class="tab" onclick="setTab('plan')" id="tab-plan"><span class="ti">📅</span>Plan</div>
  </div>

  <div id="view"></div>

function scoreFood(food, moodStr, prof){
  let s=0;
  const tc=topK(prof.cuisines,3), tt=topK(prof.tags,5);
  if(tc.includes(food.c)) s+=4;
  tt.forEach(t=>{ if(food.tags.includes(t)) s+=3; });
  const ms=(moodStr||'').toLowerCase();
  if(ms.includes('müde')||ms.includes('faul')) if(food.m.includes('komfort')||food.m.includes('hangover')) s+=4;
  if(ms.includes('sport')) if(food.tags.includes('healthy')||food.m.includes('proteinreich')) s+=5;
  if(ms.includes('krank')) if(food.m.includes('krank')||food.m.includes('leicht')) s+=6;
  if(ms.includes('date')) if(food.m.includes('date night')||food.m.includes('special')) s+=5;
  if(ms.includes('hungrig')&&food.kcal>600) s+=3;
  if(ms.includes('vegan')&&food.diet.includes('vegan')) s+=5;
  if(ms.includes('veggie')&&(food.diet.includes('vegan')||food.diet.includes('vegetarian'))) s+=4;
  if(ms.includes('spicy')&&food.tags.includes('spicy')) s+=4;
  if(ms.includes('leicht')&&food.kcal<500) s+=3;
  if(ms.includes('schnell')&&(food.tags.includes('fast')||parseInt(food.t)<15)) s+=4;
  if(ms.includes('unter €10')&&food.p<10) s+=5;
  if(ms.includes('€10')&&food.p>=10&&food.p<=15) s+=2;
  if(ms.includes('neues')&&!tc.includes(food.c)) s+=3;
  if(ms.includes('teilen')&&food.tags.includes('sharing')) s+=4;
  if(ms.includes('comfort')&&food.tags.includes('comfort')) s+=4;
  if(ms.includes('movie')&&food.m.includes('movie night')) s+=4;
  if(ms.includes('brunch')&&(food.tags.includes('brunch')||food.m.includes('morgen'))) s+=4;
  s+=Math.random()*.5;
  return s;
}

function buildCards(pool){
  const area=$('carea'); if(!area) return;
  const stack=pool.slice(swipeIdx,swipeIdx+3);
  if(!stack.length){
    area.innerHTML=`<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:20px;background:rgba(255,255,255,.02);border:1px solid var(--bdr2);gap:12px">

    </div>`; return;
  }
  area.innerHTML=[...stack].reverse().map((f,i)=>{
    const isTop=i===stack.length-1;
    const rot=isTop?0:(i===0?-2.2:1.2);
    const sc=isTop?1:(i===0?.95:.97);
    const yy=isTop?0:(i===0?10:5);
    const isFaved=favs.find(x=>x.id===f.id);
    const showTags=[...f.tags,...f.diet].slice(0,3);
    return `<div id="c${f.id}" class="card${isTop?' pi':''}" style="transform:rotate(${rot}deg) scale(${sc}) translateY(${yy}px);z-index:${i+1};background:${f.bg||'var(--card)'};${isTop?'cursor:grab':'pointer-events:none'}">
      <div class="ctop">
        <div class="cbadge">${f.c}</div>
        <div class="ctop-btns">
          <div class="cib" onclick="openRestaurant(${f.id})">🗺️</div>

        </div>
      </div>

      <div class="stamp sy" id="sy${f.id}">YUMMY ✓</div>
      <div class="stamp sn" id="sn${f.id}">NOPE ✗</div>
      <div class="stamp sp" id="sp${f.id}">📅 PLAN</div>
      <div class="cbot">
        <div class="ctags">${showTags.map(t=>`<span class="ctag ${t}">${t}</span>`).join('')}</div>
        <div class="cname">${f.n}</div>
        <div class="cdesc">${f.d}</div>
        <div class="cmeta">
          <div class="cmi">⏱ ${f.t}</div>
          <div class="cmi">🔥 ${f.kcal}</div>
          <div class="cmi">⭐ ${f.r}</div>
          <div class="cprice">${fmtP(f.p)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  if(stack.length) initDrag(stack[stack.length-1], pool);
}

function initDrag(food, pool){
  const card=$('c'+food.id); if(!card) return;
  let sx=0,sy=0,dx=0,dy=0,down=false;
  const start=e=>{ down=true; const pt=e.touches?e.touches[0]:e; sx=pt.clientX; sy=pt.clientY; card.style.transition='none'; };
  const move=e=>{
    if(!down) return; if(e.cancelable) e.preventDefault();
    const pt=e.touches?e.touches[0]:e; dx=pt.clientX-sx; dy=pt.clientY-sy;
    card.style.transform=`rotate(${dx/16}deg) translateX(${dx}px) translateY(${dy}px)`;
    const sy2=$('sy'+food.id), sn=$('sn'+food.id), sp=$('sp'+food.id);
    if(sy2) sy2.style.opacity=dx>40?Math.min((dx-40)/80,1):0;
    if(sn)  sn.style.opacity=dx<-40?Math.min((-dx-40)/80,1):0;
    if(sp)  sp.style.opacity=dy<-40?Math.min((-dy-40)/80,1):0;
  };
  const end=()=>{
    if(!down) return; down=false;
    card.style.transition='transform .35s cubic-bezier(.175,.885,.32,1.275)';
    if(dx>100){ doSwipe(food,'right',pool); return; }
    if(dx<-100){ doSwipe(food,'left',pool); return; }
    if(dy<-80){ doSwipe(food,'up',pool); return; }
    card.style.transform='rotate(0deg) translateX(0) translateY(0)';
    dx=0; dy=0;
  };
  card.addEventListener('mousedown',start);
  card.addEventListener('mousemove',move);
  card.addEventListener('mouseup',end);
  card.addEventListener('touchstart',start,{passive:true});
  card.addEventListener('touchmove',move,{passive:false});
  card.addEventListener('touchend',end);
}

function doSwipe(food,dir,pool){
  const card=$('c'+food.id); if(!card) return;
  card.style.transition='transform .28s ease-in,opacity .28s ease-in';
  if(dir==='right'){
    card.style.transform='translateX(160%) rotate(30deg)';
    addFav(food); toast(`❤️ ${food.n} geliked!`); updProfile(food,'like');
    if(pro) logMeal(food);
  } else if(dir==='left'){
    card.style.transform='translateX(-160%) rotate(-30deg)';
    updProfile(food,'skip');
  } else if(dir==='up'){
    card.style.transform='translateY(-140%) rotate(-5deg)';
    openPlanPicker(food);
  }
  histLog.unshift({...food,dir,ts:new Date().toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'})});
  save('hh_hist',histLog.slice(0,100));
  setTimeout(()=>{ swipeIdx++; buildCards(pool); updateSwMeta(pool.length-swipeIdx); buildTChips(); checkAchievements(); },280);
}

function updProfile(food,act){
  profile.sw++;
  if(act==='like'){ profile.lk++; food.tags.forEach(t=>{ profile.tags[t]=(profile.tags[t]||0)+1; }); profile.cuisines[food.c]=(profile.cuisines[food.c]||0)+1; }
  save('hh_profile',profile);
}
function btnSw(dir){ const p=getPool(); const f=p[swipeIdx]; if(f) doSwipe(f,dir,p); }
function undoLast(){ if(swipeIdx<=0) return; swipeIdx--; histLog.shift(); save('hh_hist',histLog); renderSwipe(); toast('↩ Rückgängig'); }

function onSrch(v){ searchQ=v; if(CT==='swipe'){const p=getPool();buildCards(p);updateSwMeta(p.length-swipeIdx);}else if(CT==='favs') renderFavs(); }
function updateSwMeta(n){ const el=$('swmeta'); if(el) el.textContent=`${Math.max(0,n)} Gerichte verfügbar · ${city.n}`; }
function buildTChips(){ const el=$('tchips'); if(!el) return; const top=Object.entries(profile.tags||{}).sort((a,b)=>b[1]-a[1]).slice(0,5); if(!top.length){el.innerHTML=`<div style="font-size:10px;color:var(--mut)">Swipe um dein Geschmacksprofil aufzubauen</div>`;return;} el.innerHTML=top.map(([t,n])=>`<div class="tchip">${t} <span style="opacity:.5">${n}×</span></div>`).join(''); }

function addFav(food){ if(!favs.find(f=>f.id===food.id)){ favs.unshift(food); save('hh_favs',favs); } }

function renderFChips(){ const el=$('fchips'); if(!el) return; el.innerHTML=fridgeIngs.map((v,i)=>`<div class="fchip">${v}<span onclick="rmFIng(${i})" style="font-size:14px;opacity:.6;margin-left:2px">×</span></div>`).join(''); }
function addFIng(v){ v=(v||'').trim(); if(!v) return; if(!fridgeIngs.includes(v)){fridgeIngs.push(v);save('hh_fridge',fridgeIngs);} const inp=$('fInp'); if(inp) inp.value=''; renderFChips(); profile.fridgeScans=(profile.fridgeScans||0)+1; save('hh_profile',profile); checkAchievements(); }
function rmFIng(i){ fridgeIngs.splice(i,1); save('hh_fridge',fridgeIngs); renderFChips(); }
function matchFridge(){
  if(!fridgeIngs.length){toast('Gib zuerst Zutaten ein 🧊');return;}

  const el=$('fres'); if(!el) return;
  if(!results.length){el.innerHTML=`<div class="empty"><div class="eico">😕</div><div class="ettl">Keine Treffer</div><div class="esub">Füge mehr Zutaten hinzu</div></div>`;return;}

    ${f.missing.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">${f.missing.slice(0,3).map(m=>`<span style="padding:2px 7px;border-radius:50px;font-size:9px;background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.22)">fehlt: ${m}</span>`).join('')}</div>`:`<div style="font-size:10px;color:var(--grn);margin-top:4px">✓ Alle Zutaten vorhanden!</div>`}</div>
    <button class="smb" style="background:var(--acc);color:#fff;margin-top:2px" onclick="openDecisionFor(${f.id})">Kochen</button>
  </div>`).join('')}`;
}

function shareWeek(){
  const td=todayMeals(); const sp=td.reduce((s,m)=>s+m.p,0); const kc=td.reduce((s,m)=>s+m.kcal,0);
  const txt=`📊 Heute ${td.length} Mahlzeiten · ${kc} kcal · ${fmtP(sp)}\n🏙️ ${city.n}\n\nEntdeckt mit HUNGERHERO 🍽️`;
  if(navigator.share){navigator.share({title:'HUNGERHERO Stats',text:txt}).catch(()=>{});}
  else{navigator.clipboard?.writeText(txt);toast('📋 In Zwischenablage kopiert!');}
  profile.shares=(profile.shares||0)+1; save('hh_profile',profile); checkAchievements();
}
function shareCurrent(){
  const p=getPool(); const food=p[swipeIdx];
  if(!food){toast('Kein Gericht zum Teilen');return;}
  const txt=`${food.e} ${food.n}\n${food.c} · ${fmtP(food.p)} · ⭐${food.r}\n🏙️ ${city.n}\n\nEntdeckt mit HUNGERHERO 🍽️`;
  if(navigator.share){navigator.share({title:food.n,text:txt}).catch(()=>{});}
  else{navigator.clipboard?.writeText(txt);toast('📋 In Zwischenablage kopiert!');}
  profile.shares=(profile.shares||0)+1; save('hh_profile',profile); checkAchievements();
}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button onclick="shareAchievement(${JSON.stringify(a)})" style="padding:11px;border-radius:11px;background:rgba(255,214,10,.12);border:1px solid rgba(255,214,10,.25);color:var(--yel);font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">📸 Story teilen</button>
      <button onclick="closeAchievement()" style="padding:11px;border-radius:11px;background:var(--dim);border:1px solid var(--bdr);color:var(--mut);font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">Weiter →</button>
    </div>
  </div>`;
  $('acOvl').classList.add('on');
  spawnConfetti();
  setTimeout(()=>$('acOvl').classList.remove('on'),5000);
}
function closeAchievement(){ $('acOvl').classList.remove('on'); }
function shareAchievement(a){
  const txt=`${a.e} Achievement freigeschaltet: "${a.t}"\n${a.d}\n🏙️ ${city.n} · HUNGERHERO 🍽️`;
  if(navigator.share) navigator.share({title:'Achievement!',text:txt}).catch(()=>{});
  else{ navigator.clipboard?.writeText(txt); toast('📋 Kopiert!'); }
  closeAchievement();
}
function spawnConfetti(){
  const colors=['#FF6B35','#FFD60A','#00E676','#448AFF','#C084FC','#FF006E'];
  for(let i=0;i<28;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.cssText=`left:${10+Math.random()*80}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.4+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;transform:rotate(${Math.random()*360}deg);border-radius:${Math.random()>0.5?'50%':'2px'}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2800);
  }
}

function renderAchievements(){
  $('view').innerHTML=`<div class="shdr"><div class="sttl">🏆 Achievements</div><div class="ssub">${achievedIds.length}/${ACHIEVES.length} erreicht</div></div>
  <div class="scroll">
    <div class="agrid">${ACHIEVES.map(a=>`<div class="acard${achievedIds.includes(a.id)?' unlocked':' locked'}" onclick="${achievedIds.includes(a.id)?`shareAchievement(${JSON.stringify(a).replace(/"/g,"'")})`:''}">
      <span class="aico">${a.e}</span><div class="atitle">${a.t}</div>
    </div>`).join('')}
    </div><div style="height:16px"></div>
  </div>`;
}

// ─── WATCHLIST / PREISALARM ───────────────────────────────────────────────────
function addWatchlist(foodId, targetPrice){
  if(!pro){openPaywall();return;}
  const food=F.find(f=>f.id===foodId); if(!food) return;
  watchlist=watchlist.filter(w=>w.id!==foodId);
  watchlist.push({id:foodId,n:food.n,e:food.e,base:food.p,target:targetPrice,added:new Date().toISOString(),triggered:false});
  save('hh_watchlist',watchlist);
  toast(`🔔 Preisalarm für ${food.e} ${food.n} bei ${fmtP(targetPrice)} gesetzt`);
  checkPriceAlerts();
}
function checkPriceAlerts(){
  watchlist.forEach(w=>{
    if(w.triggered) return;
    const cur=+(w.base*(0.85+Math.random()*.3)).toFixed(2);
    if(cur<=w.target){ w.triggered=true; save('hh_watchlist',watchlist); toast(`🔔 ${w.e} ${w.n} jetzt nur ${fmtP(cur)}! Dein Zielpreis: ${fmtP(w.target)}`,4000); }
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  initLoc();
  if(pro){ $('proBtn').innerHTML='👑'; $('proBtn').style.background='linear-gradient(135deg,rgba(255,214,10,.35),rgba(255,107,53,.35))'; }
  renderMood();
  setTimeout(checkPriceAlerts, 2000);
  // Init paywall features
  document.querySelectorAll('#pwFeatures').forEach(el=>{
    el.innerHTML=[['💚','Health Dashboard','Kalorien, Budget, Makros'],['🧠','Lernende Mood Engine','Wird mit jedem Swipe smarter'],['💰','Preisalarm','Push wenn dein Gericht günstiger wird'],['🧊','Kühlschrank-KI','Rezepte aus vorhandenen Zutaten'],['📅','Wochenbudget-Planer','7 Tage automatisch geplant']].map(([i,t,s])=>`<div style="display:flex;gap:10px;align-items:center;padding:9px 11px;border-radius:11px;background:var(--card);border:1px solid var(--bdr2)"><span style="font-size:18px">${i}</span><div><div style="font-size:12px;font-weight:700;color:#fff">${t}</div><div style="font-size:10px;color:var(--mut);margin-top:1px">${s}</div></div></div>`).join('');
  });
});
</script>
